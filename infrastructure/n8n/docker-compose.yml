# ScoreMyPrompt N8N Automation Stack
# Mini PC (N100 16GB) deployment for content automation
#
# 3-Tier AI Strategy:
#   Tier 1: Groq 70B free API (55%) — drafts, summaries, translations
#   Tier 2: Ollama 3B local (30%) — hashtags, captions, reformatting
#   Tier 3: Claude Max (15%) — deep analysis, strategy (manual via browser)
#
# Usage:
#   cp .env.example .env  # Edit with your values
#   docker compose up -d
#   Open N8N: http://localhost:5678

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: smp-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=${TIMEZONE:-America/New_York}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-change-this-to-random-string}
      # Database
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8n_secret}
      # Execution data management (v4 optimization)
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=none
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      # Queue mode with Redis
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      # AI API keys
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/workflows
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - smp-network

  postgres:
    image: postgres:16-alpine
    container_name: smp-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-n8n}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-n8n_secret}
      - POSTGRES_DB=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smp-network

  redis:
    image: redis:7-alpine
    container_name: smp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - smp-network

  # Ollama — Local AI (Tier 2: 3B model for hashtags, captions, reformatting)
  # Uses ~3-4GB RAM on N100 16GB system
  ollama:
    image: ollama/ollama:latest
    container_name: smp-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - smp-network

  # Cloudflare Tunnel — Expose N8N webhooks publicly (zero-cost)
  # Required for: ScoreMyPrompt webhook triggers, external integrations
  # Setup: cloudflared tunnel create smp-n8n → copy token
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: smp-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - n8n
    networks:
      - smp-network
    profiles:
      - tunnel

volumes:
  n8n_data:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  smp-network:
    driver: bridge
