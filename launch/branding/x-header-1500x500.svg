<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="50%" stop-color="#1a1145"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="orb1" cx="80%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="20%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bgGrad)"/>
  <rect width="1500" height="500" fill="url(#orb1)"/>
  <rect width="1500" height="500" fill="url(#orb2)"/>

  <!-- Grid pattern (subtle) -->
  <g opacity="0.03" stroke="white" stroke-width="1">
    <line x1="0" y1="100" x2="1500" y2="100"/><line x1="0" y1="200" x2="1500" y2="200"/>
    <line x1="0" y1="300" x2="1500" y2="300"/><line x1="0" y1="400" x2="1500" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="500"/><line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/><line x1="1200" y1="0" x2="1200" y2="500"/>
  </g>

  <!-- Logo icon -->
  <rect x="120" y="160" width="80" height="80" rx="16" fill="url(#accent)"/>
  <text x="160" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="48" font-weight="800" fill="white">S</text>

  <!-- Brand name -->
  <text x="225" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="48" font-weight="800" fill="white">ScoreMyPrompt</text>

  <!-- Tagline -->
  <text x="225" y="255" font-family="system-ui,sans-serif" font-size="20" font-weight="500" fill="#94a3b8">AI Prompt Grading for Professionals</text>

  <!-- PROMPT dimension badges -->
  <g transform="translate(225, 290)">
    <rect x="0" y="0" width="44" height="44" rx="8" fill="#3b82f620" stroke="#3b82f640" stroke-width="1"/>
    <text x="22" y="29" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#60a5fa">P</text>
    <rect x="56" y="0" width="44" height="44" rx="8" fill="#3b82f620" stroke="#3b82f640" stroke-width="1"/>
    <text x="78" y="29" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#60a5fa">R</text>
    <rect x="112" y="0" width="44" height="44" rx="8" fill="#8b5cf620" stroke="#8b5cf640" stroke-width="1"/>
    <text x="134" y="29" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#a78bfa">O</text>
    <rect x="168" y="0" width="44" height="44" rx="8" fill="#8b5cf620" stroke="#8b5cf640" stroke-width="1"/>
    <text x="190" y="29" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#a78bfa">M</text>
    <rect x="224" y="0" width="44" height="44" rx="8" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
    <text x="246" y="29" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#818cf8">S</text>
    <rect x="280" y="0" width="44" height="44" rx="8" fill="#6366f120" stroke="#6366f140" stroke-width="1"/>
    <text x="302" y="29" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#818cf8">T</text>
  </g>

  <!-- Right side: Score preview -->
  <g transform="translate(950, 120)">
    <rect x="0" y="0" width="420" height="260" rx="16" fill="#1a1f2e" stroke="#2a2f3e" stroke-width="1"/>
    <text x="210" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="2">PROMPT SCORE</text>
    <text x="210" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="80" font-weight="900" fill="#10b981">92</text>
    <text x="210" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#10b981">Grade S — Exceptional</text>
    <!-- Mini bars -->
    <g transform="translate(30, 170)">
      <rect x="0" y="0" width="360" height="6" rx="3" fill="#1e293b"/><rect x="0" y="0" width="342" height="6" rx="3" fill="#10b981"/>
      <rect x="0" y="14" width="360" height="6" rx="3" fill="#1e293b"/><rect x="0" y="14" width="324" height="6" rx="3" fill="#3b82f6"/>
      <rect x="0" y="28" width="360" height="6" rx="3" fill="#1e293b"/><rect x="0" y="28" width="306" height="6" rx="3" fill="#3b82f6"/>
      <rect x="0" y="42" width="360" height="6" rx="3" fill="#1e293b"/><rect x="0" y="42" width="335" height="6" rx="3" fill="#10b981"/>
      <rect x="0" y="56" width="360" height="6" rx="3" fill="#1e293b"/><rect x="0" y="56" width="292" height="6" rx="3" fill="#f59e0b"/>
      <rect x="0" y="70" width="360" height="6" rx="3" fill="#1e293b"/><rect x="0" y="70" width="338" height="6" rx="3" fill="#10b981"/>
    </g>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="494" width="1500" height="6" fill="url(#accent)"/>
</svg>
