<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0f1a"/>
  <!-- Outer glow ring -->
  <rect x="32" y="32" width="448" height="448" rx="80" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.3"/>
  <!-- Main gradient box -->
  <rect x="96" y="96" width="320" height="320" rx="64" fill="url(#bg)"/>
  <!-- S letter -->
  <text x="256" y="310" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-size="220" font-weight="800" fill="white">S</text>
  <!-- Subtle shine -->
  <rect x="96" y="96" width="320" height="160" rx="64" fill="white" opacity="0.06"/>
</svg>
